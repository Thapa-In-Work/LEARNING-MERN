<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Password"><br><br>

        <p>I want to join mindrisers Internship program after my training is over</p>
        <label for="yes">Yes</label>
        <input type="radio" id="yes" name="conform">

        <label for="no">No</label>
        <input type="radio" id="no" name="conform"><br><br>

        <label for="file">File</label>
        <input type="file" id="file"><br><br>

        <label for="date">Date</label>
        <input type="date" id="date"><br><br>

        <label for="time">Time</label>
        <input type="time" id="time"><br><br>

        <label for="range">Range</label>
        <input type="range" id="range"><br><br>

        <label for="color">Color</label>
        <input type="color" id="color"><br><br>

        <label for="datetime">Date & Time</label>
        <input type="datetime-local" id="datetime"><br><br>

        <label for="search">Search</label>
        <input type="search" id="search" placeholder="Search"><br><br>

        <label for="tel">Phone Number</label>
        <input type="tel" id="tel" placeholder="Tel-No"><br><br>

        <label for="role">Role</label>
        <input type="hidden" value="Staff" id="hidden"><br><br>

        <label for="url">URL</label>
        <input type="url" id="url" placeholder="URL"><br><br>


        <select name="" id="">
            <option>Select</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="c++">C++</option>
            <option value="javascript">JavaScript</option>
            <option value="Node.js">Node.js</option>
        </select> <br><br>

        <textarea name="" id="" cols="30" rows="10" placeholder="Message"></textarea><br><br>

        <h3>Choose intrested course</h3>
        <input type="checkbox" name="course">
        <label for="">Python</label><br>
        <input type="checkbox" name="course">
        <label for="">Java</label><br>
        <input type="checkbox" name="course">
        <label for="">C++</label><br>
        <input type="checkbox" name="course">
        <label for="">JavaScript</label> <br>
        <input type="checkbox" name="course">
        <label for="">Node.js</label><br><br>


        <input type="reset"> <br>
        <button type="button">Submit</button>
    </form>


    <details>
        <summary>Categories</summary>
        <a href="">Stc</a> <br>
        <a href="">Django</a>
    </details>

</body>

</html>
